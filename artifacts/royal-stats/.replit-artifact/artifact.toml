kind = "mobile"
previewPath = "/"
title = "Royal Stats - Clash Royale"
version = "1.0.0"
id = "artifacts/royal-stats"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18412

[services.development]
run = "pnpm --filter @workspace/royal-stats run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royal-stats", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/royal-stats", "run", "serve" ]

[services.env]
PORT = "18412"
BASE_PATH = "/"
